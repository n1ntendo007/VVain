<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#df303b" />
    <meta name="description" content="VVain — приложение официанта для учёта заказов по столикам и чаевых." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VVain" />
    <title>VVain</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" href="./icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <section class="screen" id="screen-home" aria-label="Главный экран">
        <header class="topbar">
          <div class="topbar__inner topbar__inner--home">
            <h1 class="brand">VVain</h1>
            <div class="role-pill" aria-label="Роль пользователя: официант">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12.2a3.6 3.6 0 1 0 0-7.2 3.6 3.6 0 0 0 0 7.2Z"/><path d="M6.5 19v-1c0-2 1.6-3.6 3.6-3.6h3.8c2 0 3.6 1.6 3.6 3.6v1"/></svg>
              <span>Официант</span>
              <svg class="chevron" viewBox="0 0 20 20" aria-hidden="true"><path d="m5 7.5 5 5 5-5"/></svg>
            </div>
          </div>
        </header>

        <main class="content content--home">
          <section class="plan" aria-label="Схема столиков">
            <div class="plan__divider" aria-hidden="true"></div>

            <!-- left column -->
            <button class="table table--square t13" data-table="13" type="button"><span class="table__num">13</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t14" data-table="14" type="button"><span class="table__num">14</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t12" data-table="12" type="button"><span class="table__num">12</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t15" data-table="15" type="button"><span class="table__num">15</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t11" data-table="11" type="button"><span class="table__num">11</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t16" data-table="16" type="button"><span class="table__num">16</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t10" data-table="10" type="button"><span class="table__num">10</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t17" data-table="17" type="button"><span class="table__num">17</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>

            <!-- right column -->
            <button class="table table--circle t5" data-table="5" type="button"><span class="table__num">5</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t4" data-table="4" type="button"><span class="table__num">4</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--circle t6" data-table="6" type="button"><span class="table__num">6</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t3" data-table="3" type="button"><span class="table__num">3</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--circle t7" data-table="7" type="button"><span class="table__num">7</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t2" data-table="2" type="button"><span class="table__num">2</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--circle t8" data-table="8" type="button"><span class="table__num">8</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square t1" data-table="1" type="button"><span class="table__num">1</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--circle t9" data-table="9" type="button"><span class="table__num">9</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
          </section>

          <section class="tips-summary">
            <div class="tips-summary__left">
              <div class="tips-summary__icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4.2c-2.1 0-3.8 1.5-3.8 3.4 0 .8.3 1.6.9 2.2l-2.6 2.8c-.9 1-.8 2.6.2 3.5.5.4 1.1.6 1.8.6h7c1.5 0 2.7-1.2 2.7-2.6 0-.6-.2-1.2-.6-1.6l-2.5-2.7c.5-.6.9-1.4.9-2.2 0-1.9-1.7-3.4-4-3.4Z"/><path d="M4.6 18.5h6.5c1.5 0 2.9.7 3.7 1.9"/><path d="M17.5 17.3c1.8 0 3.3 1.5 3.3 3.3v.4h-6.6v-.4c0-1.8 1.5-3.3 3.3-3.3Z"/><path d="M17.5 18.8v3.3"/><path d="M15.8 20.5h3.4"/></svg>
              </div>
              <div>
                <div class="tips-summary__label">Чаевые за сегодня</div>
                <div class="tips-summary__value" id="tips-total-main">0 ₽</div>
              </div>
            </div>
            <button class="tips-summary__clear" id="clear-all-tips" type="button">Очистить</button>
          </section>
        </main>
      </section>

      <section class="screen" id="screen-table" hidden aria-label="Экран столика">
        <header class="topbar">
          <div class="topbar__inner topbar__inner--table">
            <button class="icon-btn icon-btn--back" id="back-btn" type="button" aria-label="Назад">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14.8 5.5-6.6 6.5 6.6 6.5"/><path d="M9 12h10"/></svg>
            </button>
            <h2 class="table-title" id="table-title">Стол 5</h2>
            <time class="table-clock" id="table-clock">00:00</time>
          </div>
        </header>

        <main class="content content--table">
          <form id="dish-form" class="dish-form" novalidate>
            <label class="sr-only" for="dish-input">Введите блюдо</label>
            <input id="dish-input" class="dish-input" type="text" maxlength="120" autocomplete="off" autocapitalize="sentences" enterkeyhint="done" placeholder="Введите блюдо..." required />
          </form>

          <ul class="orders" id="orders"></ul>

          <section class="tips-card">
            <div class="tips-card__head">
              <div class="tips-card__icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7c0-1.8 1.8-3.2 4-3.2s4 1.4 4 3.2-1.8 3.2-4 3.2S8 8.8 8 7Z"/><path d="M6.2 11.2h11.6c1.3 0 2.4 1.1 2.4 2.4v2.1c0 1.3-1.1 2.4-2.4 2.4H6.2c-1.3 0-2.4-1.1-2.4-2.4v-2.1c0-1.3 1.1-2.4 2.4-2.4Z"/><path d="M12 5.6v2.7"/><path d="M9.7 14.7h4.6"/></svg>
              </div>
              <div class="tips-card__name">Чаевые</div>
              <div class="tips-card__amount" id="tips-total-table">0 ₽</div>
            </div>
            <button class="tips-card__button" id="open-tip-modal" type="button">
              <span>Чаевые столику</span>
              <span class="tips-card__plus">+</span>
            </button>
          </section>
        </main>
      </section>

      <div class="sheet-backdrop" id="sheet-backdrop" hidden>
        <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
          <div class="sheet__header">
            <h3 class="sheet__title" id="sheet-title">Чаевые к столику 5</h3>
            <button class="sheet__close" id="close-tip-modal" type="button" aria-label="Закрыть окно чаевых">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12"/><path d="M18 6 6 18"/></svg>
            </button>
          </div>

          <div class="sheet__presets" id="tip-presets">
            <button type="button" data-value="50">50 ₽</button>
            <button type="button" data-value="100">100 ₽</button>
            <button type="button" data-value="200">200 ₽</button>
            <button type="button" data-value="500">500 ₽</button>
          </div>

          <label class="sr-only" for="custom-tip">Другая сумма</label>
          <input id="custom-tip" class="sheet__input" type="number" min="1" inputmode="numeric" placeholder="Другая сумма" />

          <button class="sheet__submit" id="add-tip-btn" type="button">Добавить чаевые</button>
        </section>
      </div>

      <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
