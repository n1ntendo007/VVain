<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#de303b" />
    <meta name="description" content="VVain — локальное приложение официанта со столиками, заказами и чаевыми." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VVain" />
    <title>VVain</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" href="./icons/favicon-32.png" sizes="32x32" type="image/png" />
    <style>[hidden]{display:none!important}</style>
    <link rel="stylesheet" href="./styles.v10.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell" data-build="v10">
      <section class="screen" id="home-screen" aria-label="Схема столиков">
        <header class="topbar">
          <div class="topbar__row topbar__row--home">
            <h1 class="brand">VVain</h1>
            <div class="role" aria-label="Роль пользователя: официант">
              <svg class="role__person" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 12.1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
                <path d="M6.4 19v-.9c0-2 1.6-3.6 3.6-3.6h4c2 0 3.6 1.6 3.6 3.6v.9" />
              </svg>
              <span>Официант</span>
              <svg class="role__chevron" viewBox="0 0 20 20" aria-hidden="true"><path d="m5 7.5 5 5 5-5" /></svg>
            </div>
          </div>
        </header>

        <main class="home-content">
          <section class="floor-plan" aria-label="Выберите столик">
            <div class="floor-plan__divider" aria-hidden="true"></div>

            <button class="table table--square p13" type="button" data-table-id="13"><span class="table__number">13</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p14" type="button" data-table-id="14"><span class="table__number">14</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p12" type="button" data-table-id="12"><span class="table__number">12</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p15" type="button" data-table-id="15"><span class="table__number">15</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p11" type="button" data-table-id="11"><span class="table__number">11</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p16" type="button" data-table-id="16"><span class="table__number">16</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p10" type="button" data-table-id="10"><span class="table__number">10</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p17" type="button" data-table-id="17"><span class="table__number">17</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>

            <button class="table table--circle p5" type="button" data-table-id="5"><span class="table__number">5</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p4" type="button" data-table-id="4"><span class="table__number">4</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--circle p6" type="button" data-table-id="6"><span class="table__number">6</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p3" type="button" data-table-id="3"><span class="table__number">3</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--circle p7" type="button" data-table-id="7"><span class="table__number">7</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p2" type="button" data-table-id="2"><span class="table__number">2</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--circle p8" type="button" data-table-id="8"><span class="table__number">8</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--square p1" type="button" data-table-id="1"><span class="table__number">1</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
            <button class="table table--circle p9" type="button" data-table-id="9"><span class="table__number">9</span><span class="table__time"></span><span class="table__badge" hidden>0</span></button>
          </section>

          <section class="tips-summary" aria-label="Итог чаевых за сегодня">
            <div class="tips-summary__left">
              <div class="circle-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 4.1c-2.1 0-3.8 1.5-3.8 3.4 0 .8.3 1.6.9 2.2l-2.6 2.8c-.9 1-.8 2.6.2 3.5.5.4 1.1.6 1.8.6h7c1.5 0 2.7-1.2 2.7-2.6 0-.6-.2-1.2-.6-1.6l-2.5-2.7c.5-.6.9-1.4.9-2.2 0-1.9-1.7-3.4-4-3.4Z" /><path d="M4.6 18.5h6.5c1.5 0 2.9.7 3.7 1.9" /><path d="M17.5 17.3c1.8 0 3.3 1.5 3.3 3.3v.4h-6.6v-.4c0-1.8 1.5-3.3 3.3-3.3Z" /><path d="M17.5 18.8v3.3" /><path d="M15.8 20.5h3.4" /></svg>
              </div>
              <div>
                <div class="tips-summary__label">Чаевые за сегодня</div>
                <div class="tips-summary__amount" id="tips-total-home">0 ₽</div>
              </div>
            </div>
            <button class="outline-button" id="clear-tips-button" type="button">Очистить</button>
          </section>
        </main>
      </section>

      <section class="screen" id="table-screen" aria-label="Экран столика" hidden>
        <header class="topbar">
          <div class="topbar__row topbar__row--table">
            <button class="icon-button" id="back-button" type="button" aria-label="Назад">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14.8 5.5-6.6 6.5 6.6 6.5" /><path d="M9 12h10" /></svg>
            </button>
            <h2 class="table-title" id="table-title">Стол 5</h2>
            <time class="table-clock" id="table-clock">00:00</time>
            <button class="icon-button icon-button--outline" id="clear-table-button" type="button" aria-label="Очистить столик">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M7 7 8 20h8l1-13" /><path d="M9 7V5h6v2" /></svg>
            </button>
          </div>
        </header>

        <main class="table-content">
          <form id="dish-form" novalidate>
            <label class="visually-hidden" for="dish-input">Введите блюдо</label>
            <input class="text-input" id="dish-input" type="text" maxlength="120" autocomplete="off" autocapitalize="sentences" enterkeyhint="done" placeholder="Введите блюдо..." required />
          </form>

          <ul class="order-list" id="order-list" aria-live="polite"></ul>

          <section class="table-tips-card" aria-label="Чаевые столику">
            <div class="table-tips-card__top">
              <div class="circle-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M8 7c0-1.8 1.8-3.2 4-3.2s4 1.4 4 3.2-1.8 3.2-4 3.2S8 8.8 8 7Z" /><path d="M6.2 11.2h11.6c1.3 0 2.4 1.1 2.4 2.4v2.1c0 1.3-1.1 2.4-2.4 2.4H6.2c-1.3 0-2.4-1.1-2.4-2.4v-2.1c0-1.3 1.1-2.4 2.4-2.4Z" /><path d="M12 5.6v2.7" /><path d="M9.7 14.7h4.6" /></svg>
              </div>
              <div class="table-tips-card__label">Чаевые</div>
              <div class="table-tips-card__amount" id="tips-total-table">0 ₽</div>
            </div>
            <button class="tips-open-button" id="open-tips-button" type="button">
              <span>Чаевые столику</span>
              <span class="tips-open-button__plus" aria-hidden="true">+</span>
            </button>
          </section>
        </main>
      </section>

      <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    </div>

    <script src="./app.v10.js" defer></script>
  </body>
</html>
